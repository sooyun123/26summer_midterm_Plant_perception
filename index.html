<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tree</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: rgb(244,244,241); overflow: hidden; }
    #tree {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      height: 100vh;
      width: auto;
      max-width: 100vw;
      object-fit: contain;
      z-index: 1;
      transform-origin: 50% 85%;
      animation: treeBreathe 6s ease-in-out infinite;

    }
    @keyframes treeBreathe {
      0%   { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      25%  { transform: translate(-50%, -50%) scale(1.004) rotate(0.15deg); }
      50%  { transform: translate(-50%, -50%) scale(1.008) rotate(0deg); }
      75%  { transform: translate(-50%, -50%) scale(1.004) rotate(-0.15deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 2;
      pointer-events: none;
      /* 사람이 사라지면(person-present 해제) 파티클이 서서히 다시 살아남.
         사람이 감지되는 순간(person-present 부여)에는 아래
         body.person-present 규칙에서 이 transition을 0s로 덮어써서
         즉각 전환되도록 함 — "관찰당하면 그 즉시 얼어붙는다"는 의도. */
      transition: opacity 2.5s ease-in-out;
    }
    /* 나무 영상 — 사람이 사라지면 서서히 다시 나타남 (감지 순간엔 즉시 사라짐) */
    #tree {
      transition: opacity 2.5s ease-in-out;
    }
    /* 사람이 감지됐을 때 나타나는 "사물처럼 보이는" 정지 화면.
       #tree와 완전히 동일한 위치·크기 규칙을 공유해서 정확히 같은 자리에 겹침.
       내부의 <img id="objectImg">가 실제 가구 사진을 보여주고, 사진 비율은
       나무 영상(768:1168, 세로로 긴 비율)과 다를 수 있으므로 object-fit:contain
       으로 잘리지 않게 중앙에 배치함. */
    #objectMode {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      height: 100vh;
      width: auto;
      max-width: 100vw;
      aspect-ratio: 768 / 1168;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgb(226,224,219);
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      /* 사람이 사라져서 다시 나무로 돌아갈 때만 서서히 페이드아웃 */
      transition: opacity 2.5s ease-in-out;
    }
    #objectImg {
      max-width: 88%;
      max-height: 70%;
      object-fit: contain;
      display: block;
    }
    /* 이미지 파일이 아직 없거나 로드에 실패했을 때 보이는 안내 텍스트.
       #objectImg의 onerror에서 이 클래스를 붙여 이미지를 숨기고 텍스트를 보여줌 —
       이미지를 나중에 넣기만 하면 이 fallback 텍스트는 자동으로 안 보이게 됨. */
    #objectMode span {
      display: none;
      color: rgb(160,157,150);
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-align: center;
      padding: 0 20px;
    }
    #objectMode.img-missing #objectImg { display: none; }
    #objectMode.img-missing span { display: block; }
    /* 사람 감지되는 순간: 나무→사물, 파티클 사라짐 전부 transition 없이
       즉시(프레임 단위) 전환됨 — "들키면 그 자리에서 확 얼어붙는다"는
       느낌을 위해 의도적으로 애니메이션을 끔. 사라질 때(위쪽 기본
       transition:2.5s 규칙)만 서서히 원상복귀됨. */
    body.person-present #tree { opacity: 0; transition: opacity 0s; }
    body.person-present #objectMode { opacity: 1; transition: opacity 0s; }
    body.person-present canvas { opacity: 0; transition: opacity 0s; }
    /* 웹캠 원본 영상은 화면에 보일 필요 없음 — 얼굴 감지용 소스로만 사용 */
    #camInput {
      position: fixed;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    /* 영상 가장자리를 배경색으로 서서히 페이드시켜, 영상 자체의 미세한
       색 얼룩(압축 노이즈 등)과 배경색이 완벽히 일치하지 않아도
       경계선이 시각적으로 드러나지 않게 함. #tree와 정확히 같은 위치·
       크기·애니메이션을 공유하도록 동일한 규칙을 적용. */
    #edgeFade {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      height: 100vh;
      width: auto;
      max-width: 100vw;
      aspect-ratio: 768 / 1168;
      z-index: 3;
      pointer-events: none;
      transform-origin: 50% 85%;
      animation: treeBreathe 6s ease-in-out infinite;
      background:
        linear-gradient(to right,  rgb(244,244,241) 0%, rgba(244,244,241,0) 6%, rgba(244,244,241,0) 94%, rgb(244,244,241) 100%),
        linear-gradient(to bottom, rgb(244,244,241) 0%, rgba(244,244,241,0) 5%, rgba(244,244,241,0) 95%, rgb(244,244,241) 100%);
    }
  </style>
</head>

      [[0.293 ,0.8562],[0.3516,0.7534],[0.4232,0.6892],[0.4987,0.6635]],
      [[0.3711,0.9075],[0.4036,0.7791],[0.4557,0.7021],[0.4987,0.6635]],
      [[0.4362,0.9289],[0.4557,0.7962],[0.4792,0.7123],[0.4987,0.6635]],
      [[0.5039,0.9632],[0.5   ,0.8219],[0.4987,0.7277],[0.4987,0.661 ]], // 중앙 원뿌리(직근) — 가장 깊음
      [[0.569 ,0.9289],[0.5508,0.7962],[0.5312,0.7123],[0.4987,0.6635]],
      [[0.638 ,0.9075],[0.6016,0.7791],[0.5534,0.7021],[0.4987,0.6635]],
      [[0.7135,0.8562],[0.651 ,0.7534],[0.5833,0.6892],[0.4987,0.6635]],
      [[0.8008,0.8005],[0.7031,0.7106],[0.612 ,0.6764],[0.4987,0.6635]],
      [[0.8919,0.7363],[0.7526,0.6866],[0.612 ,0.6695],[0.4987,0.6635]],
      [[0.957 ,0.6807],[0.7943,0.6729],[0.612 ,0.6661],[0.4987,0.6635]], // 오른쪽 거의 수평 뿌리
    ];

    // 3차 베지어 곡선 위의 t(0~1) 지점 좌표 (p0~p3는 [xFrac,yFrac])
    // xFrac은 treeLeft를 기준으로, yFrac은 화면 상단(0) 기준으로 환산
    function rootPoint(pathIdx, t) {
      const [p0, p1, p2, p3] = ROOT_PATHS[pathIdx];
      const u = 1 - t;
      const xFrac = u*u*u*p0[0] + 3*u*u*t*p1[0] + 3*u*t*t*p2[0] + t*t*t*p3[0];
      const yFrac = u*u*u*p0[1] + 3*u*u*t*p1[1] + 3*u*t*t*p2[1] + t*t*t*p3[1];
      return { x: treeLeft + xFrac * treeW, y: yFrac * height };
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      updateTreeMetrics();
      for (let i = 0; i < 300; i++) {
        const p = new WaterParticle();
        // 각 파티클을 생성 직후 무작위 프레임 수(0~1300프레임, 전체 수명을
        // 넉넉히 커버 — 가장 느린 파티클 기준 뿌리+줄기 전체 수명이 약
        // 1200프레임 정도)만큼 미리 감아서, 로드된 첫 프레임부터 이미 뿌리 끝,
        // 뿌리 중간, 줄기 등 전 구간에 물이 고르게 퍼져있는 상태로 시작함.
        // (뿌리 경로·좌표 로직은 전혀 변경하지 않음 — 진행 속도만 미리 재생)
        p.fastForward(floor(random(1300)));
        particles.push(p);
      }
      for (let i = 0; i < 70; i++) particles.push(new PhotosynthesisParticle());
      for (let i = 0; i < 50; i++) particles.push(new TranspirationParticle());
      for (let i = 0; i < 35; i++) particles.push(new CO2Particle());
      for (let i = 0; i < 60; i++) particles.push(new MicrobeParticle());
    }

    function draw() {
      clear();
      for (let p of particles) {
        p.update();
        p.show();
        if (p.isDone()) p.reset();
      }
    }

    class WaterParticle {
      constructor() { this.reset(); }
      reset() {
        // 13개 뿌리 경로 중 하나를 무작위로 선택
        this.pathIdx = floor(random(ROOT_PATHS.length));
        // 뿌리 "끝"(흙 속 가장 깊은 지점, t=0)에서 출발 — 물이 뿌리 중간에서
        // 갑자기 생겨나는 게 아니라 흙 속에서부터 빨려 올라오는 것으로 보이게 함.
        // 화면 밖으로 나가는 경로는 처음부터 화면 안에 들어오는 지점(minT)까지만
        // 스킵하되, 그 지점에서도 alpha 0에서 서서히 페이드인해서 "짠" 등장을 가림.
        this.t = 0;
        // 뿌리를 타고 올라가는 속도 (t 증가 속도) — 뿌리가 길수록(바깥쪽) 보이는
        // 구간이 짧으니 속도感이 비슷하게 느껴지도록 약간의 편차만 둠
        this.tSpeed = random(0.0016, 0.0032);
        // 경로에서 살짝 벗어나는 수직 방향 지터 (뿌리 두께감)
        this.jitterAmp = random(1.2, 3);
        this.jitterPhase = random(TWO_PI);
        this.jitterSpeed = random(0.02, 0.05);

        // 밑동(t≈1)에 도달한 뒤에는 경로를 벗어나 줄기 중심선을 타고 위로 계속 상승
        this.reachedTrunk = false;
        this.trunkX = treeLeft + treeW/2 + random(-10, 10);
        this.trunkVy = random(0.7, 1.3);
        this.trunkY = 0; // 밑동 도달 시 설정됨

        // 흙 속에서 서서히 스며나오듯 등장 — alpha를 0에서 목표값까지 페이드인
        this.targetAlpha = random(150, 220);
        this.alpha = 0;
        this.fadeInDone = false;
        this.size = random(1.4, 3.2);
        // 나무 꼭대기를 넘어가지 않도록, 줄기~아랫가지 정도에서 서서히 사라짐
        this.fadeStart = height * random(0.32, 0.42);

        this.x = 0; this.y = 0;
        this._updatePos();
      }
      _updatePos() {
        const p = rootPoint(this.pathIdx, min(this.t, 1));
        // 경로에 수직인 방향으로 살짝 흔들어 뿌리 두께 안에서 자연스럽게 움직이게 함
        const p2 = rootPoint(this.pathIdx, min(this.t + 0.01, 1));
        const dx = p2.x - p.x, dy = p2.y - p.y;
        const len = Math.max(0.0001, Math.sqrt(dx*dx + dy*dy));
        const nx = -dy/len, ny = dx/len; // 진행 방향에 수직인 법선
        const j = sin(this.jitterPhase) * this.jitterAmp;
        this.x = p.x + nx * j;
        this.y = p.y + ny * j;
      }
      update() {
        this.jitterPhase += this.jitterSpeed;
        // 흙 속에서 서서히 스며나오는 페이드인 (뿌리 끝에서 출발한 직후 구간)
        if (!this.fadeInDone) {
          this.alpha += 6;
          if (this.alpha >= this.targetAlpha) { this.alpha = this.targetAlpha; this.fadeInDone = true; }
        }
        if (!this.reachedTrunk) {
          this.t += this.tSpeed;
          if (this.t >= 1) {
            // 뿌리 경로를 다 타고 밑동에 도착 → 이제부터는 줄기를 타고 수직 상승
            this.reachedTrunk = true;
            const p = rootPoint(this.pathIdx, 1);
            this.x = p.x; this.y = p.y;
            this.trunkY = p.y;
          } else {
            this._updatePos();
            // 화면 밖(위/아래/좌우 크게 벗어난 지점)에 있는 동안은 안 보이게
            // — 알파를 0으로 눌러서 "화면 밖에서 이동 중"임을 감춤.
            // 화면 안으로 들어오면 다시 정상 페이드인 알파를 사용.
            if (this.y > height + 20 || this.y < -20 || this.x < -20 || this.x > width + 20) {
              this._hidden = true;
            } else if (this._hidden) {
              // 화면 안으로 막 들어온 시점 — 여기서부터 다시 페이드인 시작
              this._hidden = false;
              this.alpha = 0;
              this.fadeInDone = false;
            }
          }
        } else {
          this.trunkY -= this.trunkVy;
          this.y = this.trunkY;
          // 줄기 중심선으로 서서히 수렴
          this.x = lerp(this.x, this.trunkX, 0.06);
          if (this.y < this.fadeStart) this.alpha -= 9;
        }
      }
      show() {
        if (this._hidden) return;
        noStroke();
        fill(50, 120, 220, this.alpha);
        ellipse(this.x, this.y, this.size);
      }
      isDone() { return this.alpha <= 0 || this.y < -10; }
      // 페이지 로드 직후에도 이미 뿌리~줄기 곳곳에 물이 퍼져있는 상태로
      // 보이도록, 생성 시점에 n프레임만큼 미리 시뮬레이션을 감아서 시작함.
      // (경로·속도 등 다른 로직은 전혀 건드리지 않고 update()만 반복 호출)
      fastForward(n) {
        for (let i = 0; i < n; i++) {
          this.update();
          if (this.isDone()) this.reset();
        }
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      updateTreeMetrics();
    }

    // 광합성 — 잎 영역에서 반짝이는 노란/연두색 빛
    class PhotosynthesisParticle {
      constructor() { this.reset(); }
      reset() {
        // 나무 영상 폭 기준 캐노피(잎) 영역에 랜덤 분포 (화면 폭이 아니라 실제 영상 폭 기준)
        this.x = treeLeft + treeW/2 + random(-treeW*0.36, treeW*0.36);
        this.y = height*0.03 + random(0, height*0.44);
        this.baseAlpha = random(200, 255);
        this.phase = random(0, TWO_PI);
        this.speed = random(0.03, 0.08);
        this.size = random(4, 7);
        this.life = 0;
        this.maxLife = random(200, 400);
      }
      update() {
        this.phase += this.speed;
        this.life++;
        if (this.life > this.maxLife) this.reset();
      }
      show() {
        noStroke();
        let a = this.baseAlpha * (0.4 + 0.6 * (sin(this.phase) * 0.5 + 0.5));
        let s = this.size * (0.7 + 0.5 * (sin(this.phase) * 0.5 + 0.5));
        fill(255, 225, 0, a);
        ellipse(this.x, this.y, s);
        fill(255, 255, 180, a * 0.6);
        ellipse(this.x, this.y, s * 1.8);
      }
      isDone() { return false; }
    }

    // 증산작용 — 잎 끝에서 위로 퍼지는 수증기
    class TranspirationParticle {
      constructor() { this.reset(); }
      reset() {
        this.x = treeLeft + treeW/2 + random(-treeW*0.34, treeW*0.34);
        this.y = height*0.05 + random(0, height*0.43);
        this.vy = random(-0.8, -1.8);
        this.vx = random(-0.4, 0.4);
        this.alpha = random(220, 255);
        this.size = random(3, 5);
      }
      update() {
        this.y += this.vy;
        this.x += this.vx;
        this.alpha -= 2.2;
      }
      show() {
        noStroke();
        fill(50, 160, 255, this.alpha);
        ellipse(this.x, this.y, this.size);
      }
      isDone() { return this.alpha <= 0; }
    }

    // CO2 — 대기 중에 떠다니다가 잎(캐노피 영역)으로 흡수됨
    class CO2Particle {
      constructor() { this.reset(); }
      reset() {
        // 캔버스 가장자리(좌/우/위)에서 시작
        let edge = random();
        if (edge < 0.4) {
          this.x = random(0, width);
          this.y = random(0, height*0.1);
        } else if (edge < 0.7) {
          this.x = random(0, width*0.1);
          this.y = random(height*0.1, height*0.5);
        } else {
          this.x = random(width*0.9, width);
          this.y = random(height*0.1, height*0.5);
        }
        // 목표 지점: 캐노피(잎) 영역 안의 랜덤한 지점 (나무 영상 폭 기준)
        this.targetX = treeLeft + treeW/2 + random(-treeW*0.34, treeW*0.34);
        this.targetY = height*0.15 + random(0, height*0.45);
        this.startX = this.x;
        this.startY = this.y;
        this.progress = 0;
        this.speed = random(0.003, 0.008);
        this.alpha = random(120, 200);
        this.size = random(2.5, 4.5);
      }
      update() {
        this.progress += this.speed;
        // 약간의 흔들림을 주며 목표로 이동
        this.x = lerp(this.startX, this.targetX, this.progress) + sin(this.progress * 20) * 4;
        this.y = lerp(this.startY, this.targetY, this.progress);
        if (this.progress > 0.85) this.alpha -= 6;
      }
      show() {
        noStroke();
        fill(140, 140, 140, this.alpha);
        ellipse(this.x, this.y, this.size);
      }
      isDone() { return this.alpha <= 0 || this.progress >= 1; }
    }

    // 미생물 — 뿌리 주변 토양에서 꿈틀거리며 상호작용
    class MicrobeParticle {
      constructor() { this.reset(); }
      reset() {
        // 뿌리가 퍼져있는 땅속 영역 (나무 영상 폭 기준 — 화면 전체가 아님)
        this.baseX = treeLeft + treeW/2 + random(-treeW*0.44, treeW*0.44);
        this.baseY = height*0.78 + random(0, height*0.22);
        this.x = this.baseX;
        this.y = this.baseY;
        this.phase = random(0, TWO_PI);
        this.speed = random(0.03, 0.08);
        this.wander = random(8, 20);
        this.size = random(2, 4);
        this.alpha = random(150, 220);
        this.hue = random(0, 1);
        this.driftPhase = random(0, TWO_PI);
        this.driftSpeed = random(0.005, 0.015);
        // 실제 토양 미생물처럼 구균(동그라미)/간균(막대)/나선균(콤마)/쌍구균 형태를 섞음
        this.type = floor(random(4));
        this.rot = random(TWO_PI);
        this.rotSpeed = random(-0.02, 0.02);
      }
      update() {
        this.phase += this.speed;
        this.driftPhase += this.driftSpeed;
        this.x = this.baseX + sin(this.phase) * this.wander + sin(this.driftPhase) * 6;
        this.y = this.baseY + cos(this.phase * 1.3) * this.wander * 0.6;
        // 이동 방향을 향하도록 회전 (막대/콤마 모양이 자연스럽게 움직이는 방향을 보게)
        this.rot = atan2(cos(this.phase * 1.3) * this.wander * 0.6 * -1.3 * this.speed,
                          cos(this.phase) * this.wander * this.speed) + this.rotSpeed * frameCount;
      }
      show() {
        let r = lerp(120, 180, this.hue);
        let g = lerp(90, 140, this.hue);
        let b = lerp(50, 70, this.hue);
        let a = this.alpha * (0.6 + 0.4 * (sin(this.phase * 2) * 0.5 + 0.5));
        push();
        translate(this.x, this.y);
        rotate(this.rot);
        noStroke();
        fill(r, g, b, a);
        if (this.type === 0) {
          // 구균 (동그라미)
          ellipse(0, 0, this.size);
        } else if (this.type === 1) {
          // 간균 (막대)
          ellipse(0, 0, this.size * 2.3, this.size * 0.85);
        } else if (this.type === 2) {
          // 나선균 (콤마/곡선 형태)
          noFill();
          stroke(r, g, b, a);
          strokeWeight(this.size * 0.55);
          strokeCap(ROUND);
          arc(0, 0, this.size * 2.2, this.size * 2.2, -PI * 0.15, PI * 0.95);
          noStroke();
        } else {
          // 쌍구균 (두 개가 붙은 형태)
          ellipse(-this.size * 0.45, 0, this.size * 1.1);
          ellipse(this.size * 0.45, 0, this.size * 1.1);
        }
        pop();
      }
      isDone() { return false; }
    }
  </script>

  <script>
    // ══════════════════════════════════════════════════════════════
    // 카메라 기반 사람 감지 — 위 파티클 시스템(p5.js)과는 완전히
    // 독립적으로 동작함. 이 스크립트는 오직 body에 'person-present'
    // 클래스를 붙이고 떼는 역할만 하고, 실제 시각적 전환(나무↔사물,
    // 파티클 사라짐/살아남)은 전부 위쪽 <style> 블록의 CSS
    // transition으로 처리됨. 파티클 로직(WaterParticle 등)은
    // 이 스크립트가 무엇을 하든 전혀 영향받지 않고 계속 그대로 동작함.
    // ══════════════════════════════════════════════════════════════
    (function () {
      const DETECT_INTERVAL_MS = 400;   // 몇 ms마다 한 번씩 얼굴 감지를 시도할지 (너무 자주 돌리면 무거움)
      const PRESENCE_ON_DELAY_MS  = 300;  // 얼굴이 감지된 후 이 시간만큼 유지돼야 '사람 있음'으로 확정 (깜빡임 방지)
      const PRESENCE_OFF_DELAY_MS = 1800; // 얼굴이 안 보인 후 이 시간이 지나야 '사람 없음'으로 확정 (순간적으로 고개 돌리는 정도로는 안 바뀜)

      let model = null;
      let camVideo = null;
      let camReady = false;
      let lastSeenFaceAt = -Infinity;
      let lastNoFaceAt = -Infinity;
      let personPresent = false;
      let lastFaceCount = 0;
      let detectTicks = 0;
      let loadedCdnUrl = null;
      let lastModelError = null;

      const debugEl = document.getElementById('debugStatus');
      function updateDebug(extra) {
        if (!debugEl) return;
        const lines = [
          'camReady: ' + camReady,
          'model: ' + (model ? 'loaded' : 'not loaded'),
          'modelCdn: ' + (loadedCdnUrl || '-'),
          'videoSize: ' + (camVideo ? camVideo.videoWidth + 'x' + camVideo.videoHeight : '-'),
          'readyState: ' + (camVideo ? camVideo.readyState : '-'),
          'detectTicks: ' + detectTicks,
          'lastFaceCount: ' + lastFaceCount,
          'personPresent: ' + personPresent,
        ];
        if (extra) lines.push(extra);
        debugEl.textContent = lines.join('\n');
      }

      async function initCamera() {
        try {
          updateDebug('requesting camera...');
          const stream = await withTimeout(
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false }),
            10000, 'getUserMedia'
          );
          camVideo = document.getElementById('camInput');
          camVideo.srcObject = stream;
          updateDebug('stream attached, waiting for metadata...');
          await withTimeout(
            new Promise((resolve) => { camVideo.onloadedmetadata = () => resolve(); }),
            10000, 'onloadedmetadata'
          );
          // iOS Safari는 srcObject를 연결해도 autoplay 속성만으로는
          // 실제 재생이 시작되지 않는 경우가 있어, play()를 명시적으로
          // 호출해줘야 함. 호출 안 하면 프레임이 갱신되지 않아 얼굴
          // 감지 모델이 계속 같은(또는 빈) 화면만 보게 될 수 있음.
          try { await camVideo.play(); } catch (playErr) { console.warn('camVideo.play() 실패:', playErr); }
          camReady = true;
          updateDebug('camera ready');
        } catch (err) {
          // 카메라 권한이 없거나 카메라가 없는 환경 — 조용히 포기하고
          // 나무+파티클 상태(평상시 모드)로 계속 유지됨. 별도 에러 UI는 띄우지 않음.
          console.warn('카메라를 사용할 수 없어 사람 감지를 건너뜁니다:', err);
          camReady = false;
          updateDebug('camera error: ' + (err && err.message));
        }
      }

      function withTimeout(promise, ms, label) {
        return Promise.race([
          promise,
          new Promise((_, reject) => setTimeout(() => reject(new Error(label + ' timeout after ' + ms + 'ms')), ms)),
        ]);
      }

      // blazeface 모델 스크립트를 여러 CDN/URL 형태로 순서대로 시도해서 로드함.
      // 이전에 실패했던 원인: @0.1.0/dist/blazeface.js 처럼 버전과 파일 경로를
      // 정확히 박아 넣은 URL이 실제 패키지 구조와 안 맞아 404가 났을 가능성이 큼.
      // 실제로 검증된 모든 예제/튜토리얼은 버전 없는 축약형 URL을 쓰고 있고,
      // 이 경우 jsdelivr/unpkg가 자동으로 올바른 최신 진입 파일로 연결해줌.
      // 축약형을 최우선으로 시도하고, 혹시 몰라 예전 pinned 경로도 후순위 백업으로 남겨둠.
      const BLAZEFACE_CDN_URLS = [
        'https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface',
        'https://unpkg.com/@tensorflow-models/blazeface',
        'https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.1.0/dist/blazeface.js',
        'https://unpkg.com/@tensorflow-models/blazeface@0.1.0/dist/blazeface.js',
      ];

      function loadScript(url) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = url;
          s.onload = () => resolve();
          s.onerror = () => reject(new Error('script load failed: ' + url));
          document.head.appendChild(s);
        });
      }

      async function loadBlazefaceScript() {
        const failures = [];
        for (const url of BLAZEFACE_CDN_URLS) {
          try {
            updateDebug('loading script: ' + url);
            await withTimeout(loadScript(url), 8000, 'script load');
            if (typeof blazeface !== 'undefined') {
              loadedCdnUrl = url;
              return true;
            } else {
              const msg = '스크립트는 로드됐지만 blazeface 전역 객체가 없음: ' + url;
              console.warn(msg);
              failures.push(msg);
            }
          } catch (err) {
            const msg = url + ' — ' + ((err && err.message) || String(err));
            console.warn('blazeface 스크립트 로드 실패, 다음 CDN 시도:', msg);
            failures.push(msg);
            updateDebug('script failed: ' + msg);
          }
        }
        lastModelError = 'all CDNs failed:\n' + failures.join('\n');
        return false;
      }

      async function initModel() {
        try {
          const scriptLoaded = await loadBlazefaceScript();
          if (!scriptLoaded) throw new Error('모든 CDN에서 blazeface 스크립트 로드 실패');
          updateDebug('script loaded, calling blazeface.load()...');
          model = await withTimeout(blazeface.load(), 20000, 'blazeface.load()');
          updateDebug('model loaded successfully');
        } catch (err) {
          console.warn('얼굴 감지 모델 로드 실패:', err);
          model = null;
          // loadBlazefaceScript()가 이미 CDN별 상세 실패 사유를 lastModelError에
          // 남겼다면(모든 CDN 실패 케이스) 그 상세 내용을 유지하고, 그게 아니라
          // blazeface.load() 자체가 실패한 경우엔 그 에러로 채움
          if (!lastModelError || !lastModelError.startsWith('all CDNs failed')) {
            lastModelError = (err && err.message) || String(err);
          }
          updateDebug('model error: ' + lastModelError);
        }
      }

      // ── 사물 모드에서 보여줄 원목 가구 이미지 목록 ──
      // furniture/ 폴더 안에 아래 파일명 그대로 이미지를 넣으면 자동으로 작동함.
      // 지금은 8장(01~08)만 준비되어 있어서 그 8개만 활성화해둠.
      // 09_coat-rack, 10_plant-stand는 이미지가 생기면 주석만 풀면 바로 추가됨.
      const FURNITURE_IMAGES = [
        'furniture/01_rocking-chair.jpg',   // 원목 흔들의자
        'furniture/02_stool.jpg',           // 원목 스툴
        'furniture/03_drawer-chest.jpg',    // 원목 서랍장
        'furniture/04_desk.jpg',            // 원목 책상
        'furniture/05_bench.jpg',           // 원목 벤치
        'furniture/06_rocking-horse.jpg',   // 원목 흔들목마
        'furniture/07_side-table.jpg',      // 원목 사이드 테이블
        'furniture/08_bookshelf.jpg',       // 원목 책장
        // 'furniture/09_coat-rack.jpg',    // 원목 옷걸이 스탠드 — 이미지 생기면 주석 해제
        // 'furniture/10_plant-stand.jpg',  // 원목 화분 스탠드 — 이미지 생기면 주석 해제
      ];

      let lastFurniturePick = null;

      function showRandomFurniture() {
        const objectModeEl = document.getElementById('objectMode');
        const imgEl = document.getElementById('objectImg');
        if (!objectModeEl || !imgEl) return;
        let pick = FURNITURE_IMAGES[Math.floor(Math.random() * FURNITURE_IMAGES.length)];
        // 직전과 같은 가구가 연속으로 뽑히면 "안 바뀐 것처럼" 보이니,
        // 후보가 2개 이상일 때는 직전 것과 다른 게 나올 때까지 다시 뽑음
        if (FURNITURE_IMAGES.length > 1) {
          let guard = 0;
          while (pick === lastFurniturePick && guard < 20) {
            pick = FURNITURE_IMAGES[Math.floor(Math.random() * FURNITURE_IMAGES.length)];
            guard++;
          }
        }
        lastFurniturePick = pick;
        objectModeEl.classList.remove('img-missing'); // 새 이미지 시도 전엔 일단 초기화
        imgEl.src = pick;
      }

      function setPersonPresent(next) {
        if (next === personPresent) return;
        personPresent = next;
        if (next) {
          // 사람이 새로 감지될 때마다 매번 무조건 새 랜덤 가구로 교체 —
          // 언제 감지되든(전환 애니메이션 진행 중이든 완전히 끝난 뒤든)
          // 상관없이 항상 새로운 가구가 나오게 함
          showRandomFurniture();
        }
        document.body.classList.toggle('person-present', personPresent);
        updateDebug();
      }

      async function detectLoop() {
        if (model && camReady && camVideo && camVideo.readyState >= 2) {
          try {
            const predictions = await model.estimateFaces(camVideo, false);
            detectTicks++;
            lastFaceCount = predictions ? predictions.length : 0;
            const now = performance.now();
            if (predictions && predictions.length > 0) {
              lastSeenFaceAt = now;
            } else {
              lastNoFaceAt = now;
            }
            // 디바운스: 얼굴이 최근 PRESENCE_ON_DELAY_MS 안에 감지됐으면 '있음',
            // 반대로 PRESENCE_OFF_DELAY_MS 동안 계속 안 보였으면 '없음'으로 전환
            if (!personPresent && now - lastSeenFaceAt < PRESENCE_ON_DELAY_MS) {
              setPersonPresent(true);
            } else if (personPresent && now - lastSeenFaceAt > PRESENCE_OFF_DELAY_MS) {
              setPersonPresent(false);
            }
            updateDebug();
          } catch (err) {
            // 프레임 하나 실패해도 무시하고 다음 루프에서 재시도
            updateDebug('detect error: ' + (err && err.message));
          }
        } else {
          updateDebug('waiting: camReady=' + camReady + ' model=' + !!model + ' readyState=' + (camVideo ? camVideo.readyState : '-') + (lastModelError ? ('\nlastModelError: ' + lastModelError) : ''));
        }
        setTimeout(detectLoop, DETECT_INTERVAL_MS);
      }

      async function start() {
        updateDebug('starting...');
        await Promise.all([initCamera(), initModel()]);
        updateDebug();
        detectLoop();
      }

      start();
    })();
  </script>
</body>
</html>
